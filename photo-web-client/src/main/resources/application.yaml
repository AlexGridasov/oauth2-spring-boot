server:
  port: 8087

spring:
  security:
    oauth2:
      client:
        registration:
          photowebclient:
            redirect-uri: http://localhost:8087/login/oauth2/code/photowebclient
            scope: openid, profile, roles
            client-secret: gXQNlKcq7Y0OYdM2l55goK4noZUvMyX3
            client-id: photo-web-client
            authorization-grant-type: authorization_code
        provider:
          photowebclient:
            token-uri: http://localhost:8070/realms/appsdeveloper/protocol/openid-connect/token
            user-info-uri: http://localhost:8070/realms/appsdeveloper/protocol/openid-connect/userinfo
            jwk-set-uri: http://localhost:8070/realms/appsdeveloper/protocol/openid-connect/certs
            authorization-uri: http://localhost:8070/realms/appsdeveloper/protocol/openid-connect/auth
            user-name-attribute: preferred_username